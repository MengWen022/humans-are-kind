<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Humans Are Kind</title>

  <!-- 引入Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      color: #4CAF50;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #777;
      margin-bottom: 30px;
    }

    textarea {
      width: 80%;
      height: 120px;
      padding: 15px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    .messages {
      margin-top: 40px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .message {
      background-color: #fff;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .message p {
      margin: 0;
      font-size: 16px;
    }

    .message .name {
      font-weight: bold;
      color: #4CAF50;
    }
  </style>
</head>

<body>

  <h1>Humans Are Kind</h1>
  <p>Leave something kind for the world.</p>

  <!-- 留言输入框 -->
  <textarea id="messageInput" placeholder="Write something kind..."></textarea><br>

  <!-- 留言按钮 -->
  <button onclick="addMessage()">Leave a message</button>

  <!-- 显示留言的区域 -->
  <div class="messages" id="messages"></div>

  <script>
    // 初始化 Supabase 客户端
    const supabase = supabase.createClient(
      'https://hqzdwkbbyskmzbfcdogx.supabase.co', // 替换为你的 Supabase 项目 URL
      'sb_publishable_UKzaNa3QZWzVpNeTGyX6zw_UGXsaKbw'    // 替换为你的 Supabase anon key
    );

    // 添加留言到数据库并显示在页面上
    async function addMessage() {
      const content = document.getElementById("messageInput").value;

      if (content.trim() === "") return; // 防止提交空内容

      // 保存留言到 Supabase 数据库
      await supabase.from("messages").insert([{ content }]);

      // 清空输入框
      document.getElementById("messageInput").value = "";

      // 更新留言显示
      loadMessages();
    }

    // 加载留言内容（从 Supabase 加载）
    async function loadMessages() {
      const { data, error } = await supabase
        .from("messages")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Error loading messages:", error);
        return;
      }

      const messagesContainer = document.getElementById("messages");
      messagesContainer.innerHTML = ""; // 清空现有留言

      // 显示留言
      data.forEach((message) => {
        const messageDiv = document.createElement("div");
        messageDiv.className = "message";
        messageDiv.innerHTML = `<p class="name">💛 Anonymous:</p><p>${message.content}</p>`;
        messagesContainer.appendChild(messageDiv);
      });
    }

    // 页面加载时显示留言
    loadMessages();
  </script>

</body>
</html>
