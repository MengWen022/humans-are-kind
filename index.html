<!DOCTYPE html>
<html>
<head>
    <title>Humans Are Kind</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f7f7f7;
            text-align:center;
            padding:40px;
        }

        h1{
            font-size:48px;
        }

        textarea{
            width:400px;
            height:120px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:10px;
            padding:10px 20px;
            font-size:16px;
        }

        .messages{
            margin-top:40px;
            max-width:600px;
            margin-left:auto;
            margin-right:auto;
        }

        .message{
            background:white;
            padding:15px;
            margin:10px;
            border-radius:8px;
        }
    </style>
</head>

<body>

<h1>Humans Are Kind</h1>

<p>Leave something kind for the world.</p>

<textarea id="messageInput" placeholder="Write something kind..."></textarea>
<br>
<button onclick="addMessage()">Leave a message</button>

<div class="messages" id="messages"></div>

<script>

function addMessage(){

    let text=document.getElementById("messageInput").value;

    if(text==="") return;

    let message=document.createElement("div");
    message.className="message";
    message.innerText="💛 "+text;

    document.getElementById("messages").prepend(message);

    document.getElementById("messageInput").value="";
}

</script>

</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  "你的ProjectURL",
  "你的anon key"
)
</script>
<input id="name" placeholder="your name">
<textarea id="message" placeholder="leave a message"></textarea>
<button onclick="sendMessage()">Submit</button>

<div id="messages"></div>

<script>

async function sendMessage() {

  const name = document.getElementById("name").value
  const content = document.getElementById("message").value

  await supabase
    .from("messages")
    .insert([{ name, content }])

  loadMessages()
}

async function loadMessages(){

  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending:false })

  const box = document.getElementById("messages")
  box.innerHTML=""

  data.forEach(m=>{
    box.innerHTML += `<p><b>${m.name}</b>: ${m.content}</p>`
  })

}

loadMessages()

</script>
