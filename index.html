<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Humans Are Kind</title>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
      text-align: center;
    }

    /* ✅ 修复这里 */
    .hero-text {
      background-color: rgba(0, 0, 0, 0.05);
      padding: 20px;
      border-radius: 12px;
      max-width: 700px;
      margin: 0 auto 30px;
      line-height: 1.6;
    }

    h1 {
      font-size: 48px;
      color: #4CAF50;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #777;
      margin-bottom: 30px;
    }

    textarea {
      width: 80%;
      height: 120px;
      padding: 15px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    #viewer {
      margin-top: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      background-color: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    #messageText {
      font-size: 20px;
      margin-bottom: 15px;
    }

    #messageTime {
      font-size: 12px;
      color: #999;
      margin-bottom: 15px;
    }

    #likeBtn {
      background-color: #eee;
      color: #333;
    }

    #likeBtn:hover {
      background-color: #ddd;
    }
  </style>
</head>

<body>

<h1>Humans Are Kind</h1>
<p>Leave something kind for the world.</p>

<p class="hero-text">
  停下来，给自己一个呼吸的空间。用一句句温暖的话提醒你：有人在意你，你值得被善待。<br>
  哪怕只是片刻的停留，也能让心重新获得前行的力量。
</p>

<textarea id="messageInput" placeholder="Write something kind..."></textarea><br>
<button id="submitBtn">Leave a message</button>

<div id="viewer">
  <div id="messageText">Loading...</div>
  <div id="messageTime"></div>
  <button id="likeBtn">👍 0</button>
</div>

<button id="nextBtn">Next</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://hqzdwkbbyskmzbfcdogx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxemR3a2JieXNrbXpiZmNkb2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU5NjMsImV4cCI6MjA4OTIzMTk2M30.VmmXa-OK4dtm5RJEdpflMxll7GkuBPvSpPAmCWld6R8"
);

let messages = [];
let currentIndex = 0;

// 加载留言
async function loadMessages() {
  let { data } = await supabase
    .from('messages')
    .select('*')
    .order('id', { ascending: true });

  if (data && data.length > 0) {
    messages = data;
    currentIndex = Math.floor(Math.random() * messages.length);
    displayMessage(messages[currentIndex]);
  } else {
    document.getElementById("messageText").innerText = "No messages yet!";
  }
}

// 显示留言
function displayMessage(msg){
  document.getElementById("messageText").innerText = "💛 " + msg.content;

  document.getElementById("messageTime").innerText =
    msg.created_at ? new Date(msg.created_at).toLocaleString() : "";

  document.getElementById("likeBtn").innerText =
    "👍 " + (msg.likes || 0);
}

// 👍 点赞
document.getElementById("likeBtn").addEventListener("click", async function(){

  let msg = messages[currentIndex];

  let newLikes = (msg.likes || 0) + 1;

  const { error } = await supabase
    .from('messages')
    .update({ likes: newLikes })
    .eq('id', msg.id);

  if (!error) {
    msg.likes = newLikes;
    displayMessage(msg);
  }
});

// 下一条
document.getElementById("nextBtn").addEventListener("click", function(){
  if(messages.length === 0) return;

  currentIndex = (currentIndex + 1) % messages.length;
  displayMessage(messages[currentIndex]);
});

// 提交留言
document.getElementById("submitBtn").addEventListener("click", async function(){

  let text = document.getElementById("messageInput").value.trim();
  if(text === "") return;

  const { data } = await supabase.from('messages').insert([
    { content: text, likes: 0 }
  ]).select();

  if(data && data[0]){
    messages.push(data[0]);
    currentIndex = messages.length - 1;
    displayMessage(messages[currentIndex]);
    document.getElementById("messageInput").value = "";
  }
});

loadMessages();

</script>

</body>
</html>
