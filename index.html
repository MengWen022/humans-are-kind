<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Humans Are Kind</title>

  <!-- 引入Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      color: #4CAF50;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #777;
      margin-bottom: 30px;
    }

    textarea {
      width: 80%;
      height: 120px;
      padding: 15px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    .messages {
      margin-top: 40px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .message {
      background-color: #fff;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .message p {
      margin: 0;
      font-size: 16px;
    }

    .message .name {
      font-weight: bold;
      color: #4CAF50;
    }
  </style>
</head>

<body>

  <h1>Humans Are Kind</h1>
  <p>Leave something kind for the world.</p>

  <!-- 留言输入框 -->
  <textarea id="messageInput" placeholder="Write something kind..."></textarea><br>

  <!-- 留言按钮 -->
  <button id="submitBtn">Leave a message</button>
  <!-- 显示留言的区域 -->
  <div class="messages" id="messages"></div>

<script>

document.getElementById("submitBtn").addEventListener("click", function(){

    let text = document.getElementById("messageInput").value;

    if(text === "") return;

    let message = document.createElement("div");
    message.className = "message";
    message.innerText = "💛 " + text;

    document.getElementById("messages").prepend(message);

    document.getElementById("messageInput").value = "";

});

</script>

</body>
</html>
